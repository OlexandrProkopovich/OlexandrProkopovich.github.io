<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2330"/><stop offset="1" stop-color="#0a0e16"/>
    </linearGradient>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38e0c9"/><stop offset="1" stop-color="#6aa8ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- staff lines -->
  <g stroke="#2a3a59" stroke-width="2">
    <line x1="120" y1="150" x2="680" y2="150"/>
    <line x1="120" y1="185" x2="680" y2="185"/>
    <line x1="120" y1="220" x2="680" y2="220"/>
    <line x1="120" y1="255" x2="680" y2="255"/>
    <line x1="120" y1="290" x2="680" y2="290"/>
  </g>
  <!-- notes -->
  <g fill="url(#ac)">
    <ellipse cx="230" cy="255" rx="18" ry="13" transform="rotate(-20 230 255)"/>
    <ellipse cx="350" cy="220" rx="18" ry="13" transform="rotate(-20 350 220)"/>
    <ellipse cx="470" cy="185" rx="18" ry="13" transform="rotate(-20 470 185)"/>
    <ellipse cx="590" cy="150" rx="18" ry="13" transform="rotate(-20 590 150)"/>
  </g>
  <g stroke="url(#ac)" stroke-width="4">
    <line x1="246" y1="251" x2="246" y2="170"/>
    <line x1="366" y1="216" x2="366" y2="135"/>
    <line x1="486" y1="181" x2="486" y2="100"/>
    <line x1="606" y1="146" x2="606" y2="65"/>
  </g>
  <!-- scan beam -->
  <rect x="120" y="120" width="6" height="200" fill="#38e0c9" opacity="0.9"/>
  <rect x="126" y="120" width="120" height="200" fill="#38e0c9" opacity="0.06"/>
  <text x="120" y="360" font-family="JetBrains Mono, monospace" font-size="22" fill="#9aabc4">ScanScore</text>
  <text x="120" y="388" font-family="JetBrains Mono, monospace" font-size="14" fill="#6f819c">C++ · Qt5 · Optical Music Recognition</text>
</svg>
